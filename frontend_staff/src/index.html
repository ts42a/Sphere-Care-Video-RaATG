<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Med.Sphere</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --brand:#3f6fd9;
      --text:#183153;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family: "Manrope", Arial, sans-serif;
    }

    body{
      background:var(--bg);
      min-height:100vh;
      overflow:hidden;
    }

    .splash{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:22px;
      animation:fadeIn .5s ease;
    }

    .logo{
      width:min(520px, 72vw);
      max-width:520px;
      animation:floatIn .8s ease;
    }

    .welcome{
      font-size:clamp(20px, 2.4vw, 30px);
      font-weight:800;
      color:var(--text);
      letter-spacing:.2px;
      animation:fadeUp .9s ease;
    }

    .sub{
      font-size:14px;
      color:#6b7280;
      animation:fadeUp 1.05s ease;
    }

    .loader-wrap{
      width:min(260px, 62vw);
      animation:fadeUp 1.15s ease;
    }

    .loader-bar{
      width:100%;
      height:10px;
      background:#dbe3f3;
      border-radius:999px;
      overflow:hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.06);
    }

    .loader-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #3f6fd9, #5a84e6);
      border-radius:999px;
      animation:loadBar 3s linear forwards;
    }

    .loader-text{
      margin-top:10px;
      text-align:center;
      font-size:13px;
      color:#64748b;
    }

    @keyframes loadBar{
      from{ width:0%; }
      to{ width:100%; }
    }

    @keyframes fadeIn{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(14px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @keyframes floatIn{
      from{ opacity:0; transform:translateY(20px) scale(.96); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="/assets/logo.png" alt="Med.Sphere logo" />
    <div class="welcome">Welcome to Med.Sphere</div>
    <div class="sub">AI-powered care platform is starting...</div>

    <div class="loader-wrap">
      <div class="loader-bar">
        <div class="loader-fill"></div>
      </div>
      <div class="loader-text">Loading...</div>
    </div>
  </div>
  
<script>
  const loggedIn = localStorage.getItem("spherecare_logged_in") === "true";

  setTimeout(() => {
    window.location.href = loggedIn
      ? "/pages/dashboard.html"
      : "/pages/register-login.html";
  }, 3000);
</script>
</body>
</html>
