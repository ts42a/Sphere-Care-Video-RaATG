<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style/css/message.css"/>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sphere Care - Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

</head>
<body>
<div class="app">
<div id="sidebar-container"></div>
<div class="main">
  <div class="left-panel">
    <div class="lp-header">
      <div class="lp-title-row">
        <div class="lp-title">Messages</div>
        <button class="btn-new" onclick="openNewModal()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New</button>
      </div>
      <div class="unread-label" id="unread-label">Loading...</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="conv-search" placeholder="Search messages..." oninput="filterConvs()"/>
      </div>
      <div class="tab-row">
        <button class="cat-tab active" onclick="setCat('',this)">All</button>
        <button class="cat-tab" onclick="setCat('team',this)">Team</button>
        <button class="cat-tab" onclick="setCat('resident',this)">Residents</button>
        <button class="cat-tab" onclick="setCat('alerts',this)">Alerts</button>
      </div>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>
  <div class="right-chat">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">&#128172;</div>
      <div class="chat-empty-title">Select a conversation</div>
      <div class="chat-empty-sub">Choose from the left to start messaging</div>
    </div>
    <div id="chat-view" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
      <div class="chat-header">
        <div class="chat-hdr-left">
          <div class="chat-hdr-av" id="ch-av"></div>
          <div><div class="chat-hdr-name" id="ch-name"></div><div class="chat-hdr-sub" id="ch-sub"></div></div>
        </div>
        <div class="chat-hdr-actions">
          <button class="hdr-btn"><span class="tooltip">Voice Call</span><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l.93-.93a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.03z"/></svg></button>
          <button class="hdr-btn"><span class="tooltip">Video Call</span><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></button>
          <button class="hdr-btn" onclick="toggleMsgSearch()"><span class="tooltip">Search</span><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
          <button class="hdr-btn" onclick="markCurrentUnread()"><span class="tooltip">Mark unread</span><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></button>
          <button class="hdr-btn" onclick="showCtx(event)"><span class="tooltip">More</span><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg></button>
        </div>
      </div>
      <div class="msg-search-bar" id="msg-search-bar">
        <div class="search-wrap" style="margin:0;">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="msg-search-input" placeholder="Search in conversation..." oninput="searchInChat()"/>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <div class="file-preview-strip" id="file-preview-strip"></div>
        <input type="file" id="file-input" multiple accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv" style="display:none" onchange="handleFiles(this.files)"/>
        <div class="input-row">
          <textarea class="msg-textarea" id="msg-input" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <button class="icon-btn" title="Attach file" onclick="document.getElementById('file-input').click()">
              <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="icon-btn" title="Emoji" onclick="alert('Emoji - coming soon')">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <button class="send-btn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<div class="overlay" id="modal-new" onclick="if(event.target===this)closeModal('modal-new')">
  <div class="modal">
    <div class="mhdr"><h3>New Conversation</h3><button class="mclose" onclick="closeModal('modal-new')">x</button></div>
    <div class="mbody">
      <label class="flabel">Conversation Name *</label>
      <input class="finput" id="new-name" placeholder="e.g. Night Shift Team" onkeydown="if(event.key==='Enter')createConv()"/>
      <label class="flabel">Category *</label>
      <select class="fsel" id="new-cat"><option value="team">Team</option><option value="resident">Resident</option><option value="alerts">Alerts</option></select>
    </div>
    <div class="mfooter">
      <button class="btn btn-outline" onclick="closeModal('modal-new')">Cancel</button>
      <button class="btn btn-primary" onclick="createConv()">Create</button>
    </div>
  </div>
</div>
<div class="ctx" id="ctx">
  <div class="ctx-item" onclick="markCurrentRead();hideCtx()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Mark as read</div>
  <div class="ctx-item" onclick="markCurrentUnread();hideCtx()"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Mark as unread</div>
  <div class="ctx-item danger" onclick="deleteConv();hideCtx()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Delete conversation</div>
</div>



  <!-- skeleton shown while JS loads messages -->
  <div id="page-skeleton" class="d-flex" style="height:calc(100vh - 56px);">
    <div style="width:280px;border-right:1px solid #e2e8f0;" class="p-3 placeholder-glow d-flex flex-column gap-2">
      <div class="d-flex gap-2 align-items-center p-2">
        <span class="placeholder bg-secondary rounded-circle flex-shrink-0" style="width:36px;height:36px;"></span>
        <div class="flex-grow-1"><span class="placeholder bg-secondary w-75 d-block mb-1" style="height:12px;border-radius:4px;"></span><span class="placeholder bg-secondary w-50 d-block" style="height:10px;border-radius:4px;"></span></div>
      </div><div class="d-flex gap-2 align-items-center p-2">
        <span class="placeholder bg-secondary rounded-circle flex-shrink-0" style="width:36px;height:36px;"></span>
        <div class="flex-grow-1"><span class="placeholder bg-secondary w-75 d-block mb-1" style="height:12px;border-radius:4px;"></span><span class="placeholder bg-secondary w-50 d-block" style="height:10px;border-radius:4px;"></span></div>
      </div><div class="d-flex gap-2 align-items-center p-2">
        <span class="placeholder bg-secondary rounded-circle flex-shrink-0" style="width:36px;height:36px;"></span>
        <div class="flex-grow-1"><span class="placeholder bg-secondary w-75 d-block mb-1" style="height:12px;border-radius:4px;"></span><span class="placeholder bg-secondary w-50 d-block" style="height:10px;border-radius:4px;"></span></div>
      </div><div class="d-flex gap-2 align-items-center p-2">
        <span class="placeholder bg-secondary rounded-circle flex-shrink-0" style="width:36px;height:36px;"></span>
        <div class="flex-grow-1"><span class="placeholder bg-secondary w-75 d-block mb-1" style="height:12px;border-radius:4px;"></span><span class="placeholder bg-secondary w-50 d-block" style="height:10px;border-radius:4px;"></span></div>
      </div><div class="d-flex gap-2 align-items-center p-2">
        <span class="placeholder bg-secondary rounded-circle flex-shrink-0" style="width:36px;height:36px;"></span>
        <div class="flex-grow-1"><span class="placeholder bg-secondary w-75 d-block mb-1" style="height:12px;border-radius:4px;"></span><span class="placeholder bg-secondary w-50 d-block" style="height:10px;border-radius:4px;"></span></div>
      </div><div class="d-flex gap-2 align-items-center p-2">
        <span class="placeholder bg-secondary rounded-circle flex-shrink-0" style="width:36px;height:36px;"></span>
        <div class="flex-grow-1"><span class="placeholder bg-secondary w-75 d-block mb-1" style="height:12px;border-radius:4px;"></span><span class="placeholder bg-secondary w-50 d-block" style="height:10px;border-radius:4px;"></span></div>
      </div>
    </div>
    <div class="flex-grow-1 p-4 placeholder-glow d-flex flex-column gap-3">
      <span class="placeholder bg-secondary align-self-start" style="width:200px;height:40px;border-radius:16px;"></span>
      <span class="placeholder bg-secondary align-self-end" style="width:260px;height:40px;border-radius:16px;"></span>
      <span class="placeholder bg-secondary align-self-start" style="width:180px;height:40px;border-radius:16px;"></span>
      <span class="placeholder bg-secondary align-self-end" style="width:220px;height:40px;border-radius:16px;"></span>
    </div>
  </div><script>
// Hide Bootstrap skeleton once page content is ready
(function() {
  var sk = document.getElementById('page-skeleton');
  if (!sk) return;
  // Hide after JS has had a chance to render real content
  // Each page's own JS should call hideSkeleton() when data is loaded
  window.hideSkeleton = function() {
    var el = document.getElementById('page-skeleton');
    if (el) el.style.display = 'none';
  };
  // Fallback: hide after 3s regardless
  setTimeout(window.hideSkeleton, 3000);
})();
</script><script src="../style/js/script.js"></script>
<script src="../style/js/message.js"></script>
<script src="/components/sidebar.js"></script>
</body>
</html>
