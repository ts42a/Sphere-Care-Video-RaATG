<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style/css/notifications.css"/>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notifications – Sphere Care</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-date-pill" id="topbar-date">—</div>
      <div class="topbar-time-pill" id="topbar-time">—</div>
    </div>
  </div>

  <div class="content">
    <!-- LEFT -->
    <div class="left-panel">
      <div class="search-bar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search by resident, keyword or type…" oninput="filterNotifs()"/>
      </div>

      <div class="filter-tabs">
        <button class="tab-btn active" onclick="setTab('all', this)">All</button>
        <button class="tab-btn" onclick="setTab('ai', this)">AI Alert</button>
        <button class="tab-btn" onclick="setTab('appt', this)">Appointments</button>
      </div>

      <div class="notif-section-title">Appointments &amp; Alerts</div>
      <div class="notif-list" id="notif-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
      <!-- Priority Alerts -->
      <div class="panel-card">
        <div class="panel-card-title">Priority Alerts</div>
        <div class="priority-list" id="priority-list">
          <div class="empty-state" style="padding:16px;">Loading…</div>
        </div>
      </div>

      <!-- Activity Summary -->
      <div class="panel-card activity-panel">
        <div class="panel-card-title">Activity Summary</div>
        <div class="skeleton-wrap">
          <div class="skeleton" style="height:12px;width:90%;"></div>
          <div class="skeleton" style="height:12px;width:75%;"></div>
          <div class="skeleton" style="height:12px;width:85%;"></div>
          <div class="skeleton" style="height:12px;width:60%;"></div>
          <div class="skeleton" style="height:12px;width:80%;"></div>
        </div>
      </div>
    </div>
  </div>
</div><script src="../style/js/script.js"></script>
<script src="../style/js/notification.js"></script>
<script src="/components/sidebar.js"></script>
</body>
</html>
