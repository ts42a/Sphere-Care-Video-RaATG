<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../style/css/booking.css"/>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bookings – Sphere Care</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
  /* Override Bootstrap .modal conflict */
  #modal-overlay .modal {
    display: block !important;
    position: relative !important;
    top: auto !important;
    left: auto !important;
    z-index: auto !important;
    width: 440px !important;
    max-width: 95vw !important;
    background: #fff !important;
    border-radius: 18px !important;
    padding: 28px !important;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18) !important;
    animation: modalIn 0.18s ease !important;
    overflow-y: auto !important;
    max-height: 90vh !important;
  }
  @keyframes modalIn {
    from { transform: scale(0.95); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Bookings</div>
    <div class="topbar-right">
      <div class="topbar-date" id="topbar-date"></div>
      <div class="avatar topbar-avatar" id="user-avatar"></div>
    </div>
  </div>

  <div class="content">
    <!-- CALENDAR -->
    <div class="calendar-panel">
      <div class="cal-header">
        <div class="cal-month-label" id="cal-month-label"></div>
        <div class="cal-nav">
          <div class="view-toggle">
            <button class="view-btn active" id="btn-month" onclick="setView('month')">Month</button>
            <button class="view-btn" id="btn-week" onclick="setView('week')">Week</button>
          </div>
          <button class="cal-nav-btn" id="nav-prev" onclick="navPrev()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="cal-today-btn" onclick="goToday()">Today</button>
          <button class="cal-nav-btn" id="nav-next" onclick="navNext()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
      <div class="cal-grid-wrap">
        <div class="cal-dow-row">
          <div class="cal-dow">Mon</div>
          <div class="cal-dow">Tue</div>
          <div class="cal-dow">Wed</div>
          <div class="cal-dow">Thu</div>
          <div class="cal-dow">Fri</div>
          <div class="cal-dow">Sat</div>
          <div class="cal-dow">Sun</div>
        </div>
        <div class="cal-month-grid" id="cal-month-grid"></div>
      </div>
      <!-- WEEK VIEW -->
      <div class="cal-week-wrap" id="cal-week-wrap">
        <div class="cal-week-header" id="cal-week-header">
          <div class="cal-week-header-time"></div>
        </div>
        <div class="cal-week-body" id="cal-week-body">
          <div class="cal-week-times" id="cal-week-times"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="stat-today">0</div>
          <div class="stat-label">Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-cancelled">0</div>
          <div class="stat-label">Cancelled</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-pending">0</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>

      <div class="appt-panel">
        <div class="appt-header">
          <div class="appt-title">Appointments Today</div>
          <div class="legend-row">
            <span class="legend-tag ongoing">Ongoing</span>
            <span class="legend-tag upcoming">Upcoming</span>
            <span class="legend-tag completed">Completed</span>
            <span class="legend-tag requested">Requested</span>
          </div>
        </div>
        <div class="appt-list" id="appt-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Booking Details</div>
    <div id="modal-body"></div>
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">Close</button>
  </div>
</div>




  <!-- skeleton shown while JS loads booking data --><script src="../style/js/script.js"></script>
<script src="../style/js/booking.js"></script>
<script src="/components/sidebar.js"></script>
</body>
</html>
